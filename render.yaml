services:
  - type: web
    name: poshe
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_ROOT
        value: /var/data
    disk:
      name: poshe-data
      mountPath: /var/data
      sizeGB: 1
