<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#ff3d8b"><title>لوحة التحكم — Poshe</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body><nav class="nav"><div class="container nav-inner"><a href="index.html" class="brand"><div class="brand-mark">p</div><div class="brand-text"><div class="name">poshe</div><div class="tag">DASHBOARD</div></div></a><div class="nav-links"><a href="index.html">عرض الموقع</a><a href="#" id="logoutBtn" class="nav-cta" style="display:none">خروج</a></div></div></nav><div class="dash-wrap"><div class="container" id="loginView"><div class="login-card"><h2>لوحة التحكم</h2><p>أدخلي كلمة السر لإضافة الكيك للقائمة.</p><form id="loginForm"><div class="field"><label>كلمة السر</label><input type="password" id="pwInput" placeholder="••••••••" required></div><button type="submit" class="submit">دخول</button></form></div></div><div class="container" id="dashView" style="display:none"><div class="dash-grid"><div class="panel"><h3>إضافة كيكة جديدة</h3><form id="addForm"><div class="field"><label>صورة الكيك</label><input type="file" id="fileInput" accept="image/*" hidden><div class="dropzone" id="dropzone"><div class="dropzone-prompt"><strong>اضغطي لاختيار صورة</strong><span>JPG / PNG / WEBP — حد أقصى 8MB</span></div></div></div><div class="field"><label>اسم الكيكة</label><input type="text" id="nameInput" placeholder="مثلاً: كيك الشوكولاتة بالفراولة" required></div><div class="field"><label>التصنيف</label><select id="catInput"><option>كيك</option><option>كب كيك</option><option>تشيز كيك</option><option>تورتة مناسبات</option><option>حلويات</option><option>كوكيز</option></select></div><div class="field"><label>الوصف (اختياري)</label><textarea id="descInput" placeholder="طبقات إسفنجية بكريمة الزبدة وفراولة طازة..."></textarea></div><div class="field"><label>السعر (اختياري)</label><input type="text" id="priceInput" placeholder="مثلاً: 25$"></div><button type="submit" class="submit" id="submitBtn">إضافة للقائمة</button></form></div><div class="panel"><h3>الكيك المضاف <span style="color:var(--ink-soft);font-weight:600;font-size:13px;margin-right:auto" id="adminCount"></span></h3><div class="admin-list" id="adminList"></div><div class="empty" id="adminEmpty" style="display:none"><div class="empty-emoji">🎂</div><h3>لا يوجد كيك بعد</h3><p>ابدئي بإضافة أول كيكة من النموذج الجانبي.</p></div></div></div></div></div><div class="toast" id="toast"></div><script src="dashboard.js"></script></body></html>
